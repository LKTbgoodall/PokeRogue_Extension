<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: monospace;
        background-color: #1a1a24;
        color: white;
        width: 320px;
        padding: 15px;
        margin: 0;
      }
      button {
        background-color: #2b2b36;
        color: white;
        border: 1px solid #4a4a5a;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        font-size: 1rem;
        margin-bottom: 15px;
        font-family: monospace;
      }
      .pr-card {
        background: transparent;
        padding: 5px;
        margin-bottom: 15px;
      }
      .pr-card-content {
        border-left: 4px solid white;
        padding-left: 12px;
        text-align: left;
      }
      .pr-title {
        font-weight: bold;
        font-size: 14px;
        color: #ffffff;
        margin-bottom: 12px;
      }
      .pr-section {
        margin-bottom: 10px;
        font-size: 13px;
      }
      .pr-buff .pr-label,
      .pr-buff .pr-value {
        color: #4ade80;
      }
      .pr-debuff .pr-label,
      .pr-debuff .pr-value,
      .pr-danger .pr-label,
      .pr-danger .pr-value {
        color: #f87171;
      }
      .pr-label {
        font-weight: bold;
        margin-bottom: 3px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <button id="scan-btn">Scanner l'écran</button>

    <div id="card-p1" class="pr-card hidden"></div>
    <div id="card-p2" class="pr-card hidden"></div>

    <script src="popup.js"></script>
  </body>
</html>
